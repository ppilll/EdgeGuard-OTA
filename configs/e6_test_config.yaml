target:
  name: imx6ull-edgeguard
  serial_port: /dev/ttyUSB0
  baudrate: 115200
  serial_timeout_sec: 0.2
  boot_timeout_sec: 180
  login_timeout_sec: 120
  command_timeout_sec: 20
  prompt_regex: "#|\\$"
  login_user: root
  login_password: "root"
  primary_probe: serial
  ssh_enabled: false

slots:
  slot_a_device: /dev/mmcblk0p2
  slot_b_device: /dev/mmcblk0p3
  data_device: /dev/mmcblk0p4
  slot_authority: proc_cmdline_rauc_slot
  slot_probe_command: edgeguard-current-slot
  forbidden_slot_file: /etc/edgeguard_slot

power:
  mode: manual
  off_duration_sec: 5
  on_boot_wait_sec: 10
  relay_command_off: ""
  relay_command_on: ""
  psu_command_off: ""
  psu_command_on: ""
  uhubctl_location: ""
  uhubctl_port: ""

ota:
  bundle_path_on_host: bundles/output/edgeguard-update-e6.raucb
  bundle_path_on_target: /data/edgeguard-update-e6.raucb
  pre_stage_bundle: true
  install_command: edgeguard-ota-install /data/edgeguard-update-e6.raucb
  fallback_install_command: rauc install /data/edgeguard-update-e6.raucb

test:
  rounds: 10
  random_cut_min_sec: 1
  random_cut_max_sec: 180
  seed: 12345
  stop_on_fail: false
  continue_after_recovered_fail: true
  require_no_rescue_flash: true

report:
  output_dir: reports
  log_dir: reports/logs
  save_uart_log: true
  save_json: true
  save_csv: true
  save_markdown: true

probe:
  required_commands:
    - "cat /etc/edgeguard_version"
    - "cat /proc/cmdline"
    - "edgeguard-current-slot"
    - "findmnt /"
    - "findmnt /data"
    - "mount | grep /data"
    - "rauc status"
    - "rauc status --detailed"
    - "fw_printenv BOOT_ORDER"
    - "fw_printenv BOOT_A_LEFT"
    - "fw_printenv BOOT_B_LEFT"
    - "dmesg | tail -n 80"
  optional_commands:
    - "ls -l /dev/watchdog*"
    - "dmesg | grep -Ei 'watchdog|imx2-wdt|wdt|reset|reboot'"
  data_write_test_command: "sh -c 'echo e6_probe > /data/.e6_probe_write_test && sync && rm -f /data/.e6_probe_write_test && echo DATA_WRITE_OK'"