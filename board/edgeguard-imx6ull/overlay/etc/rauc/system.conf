[system]
compatible=edgeguard-imx6ull
bootloader=noop
activate-installed=false
statusfile=/data/rauc/central.raucs
mountprefix=/mnt/rauc/
bundle-formats=plain

[keyring]
path=/etc/rauc/keyring.pem

[slot.rootfs.0]
device=/dev/mmcblk0p2
type=ext4
bootname=A

[slot.rootfs.1]
device=/dev/mmcblk0p3
type=ext4
bootname=B
